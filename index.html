<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>雲端記帳 Lite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config={theme:{extend:{colors:{primary:'#6366f1',primaryDark:'#4338ca',secondary:'#10B981',danger:'#f43f5e',warning:'#f59e0b',dark:'#1e293b',surface:'#f8fafc'},fontFamily:{sans:['Noto Sans TC','sans-serif'],mono:['Courier Prime','monospace']},boxShadow:{'soft':'0 4px 20px -2px rgba(0,0,0,0.05)','glow':'0 0 15px rgba(99,102,241,0.3)','float':'0 10px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1)'},animation:{'slide-up':'slideUp 0.3s cubic-bezier(0.16,1,0.3,1)','fade-in':'fadeIn 0.2s ease-out','pulse-fast':'pulseFast 1.5s cubic-bezier(0.4,0,0.6,1) infinite','toast-enter':'toastEnter 0.4s cubic-bezier(0.16,1,0.3,1)'},keyframes:{slideUp:{'0%':{transform:'translateY(100%)'},'100%':{transform:'translateY(0)'}},fadeIn:{'0%':{opacity:'0'},'100%':{opacity:'1'}},pulseFast:{'0%,100%':{opacity:'1'},'50%':{opacity:'.7'}},toastEnter:{'0%':{transform:'translate(-50%, 100%)',opacity:'0'},'100%':{transform:'translate(-50%, 0)',opacity:'1'}}}}}}
    </script>
    <style>
        body{-webkit-tap-highlight-color:transparent;background-color:#f1f5f9;font-family:'Noto Sans TC',sans-serif}
        .glass{background:rgba(255,255,255,0.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,0.8)}
        .app-frame{max-width:28rem;margin:0 auto;background-color:#f8fafc;height:100dvh;width:100%;display:flex;flex-direction:column;box-shadow:0 0 40px rgba(0,0,0,0.1);position:relative;overflow:hidden}
        @media(min-width:640px){.app-frame{height:95vh;margin-top:2.5vh;border-radius:2rem;border:8px solid #fff;overflow:hidden;}}
        .hide-scrollbar::-webkit-scrollbar{display:none}.hide-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
        .fab-btn{background:linear-gradient(135deg,#6366f1 0%,#4f46e5 100%);box-shadow:0 8px 20px -4px rgba(99,102,241,0.5);transition:all 0.2s cubic-bezier(0.16,1,0.3,1);}
        .gradient-card{background:linear-gradient(135deg,#4f46e5 0%,#818cf8 100%);color:white}
        .nav-item{color:#94a3b8; transition:color 0.2s;}
        .nav-item.active{color:#4f46e5}.nav-item.active::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:4px;height:4px;background-color:#4f46e5;border-radius:50%}
        .input-box{background:#f1f5f9;border:1px solid transparent;transition:all 0.2s}.input-box:focus{background:#fff;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
        .receipt-jagged{background:linear-gradient(135deg,transparent 5px,white 0) top left,linear-gradient(225deg,transparent 5px,white 0) top right;background-size:10px 10px;background-repeat:repeat-x}
        .nav-scroll { overflow-x: auto; padding-left: 0.5rem; padding-right: 0.5rem; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
        #main-content { padding-bottom: 8.5rem; }
        
        /* Custom Checkbox styles */
        .custom-checkbox {
            appearance: none; background-color: #fff; margin: 0; width: 1.25em; height: 1.25em; border: 2px solid #cbd5e1; border-radius: 0.35em; display: grid; place-content: center; transition: all 0.2s ease-in-out;
        }
        .custom-checkbox::before {
            content: ""; width: 0.65em; height: 0.65em; transform: scale(0); transition: 120ms transform ease-in-out; box-shadow: inset 1em 1em white; background-color: transform-origin: center; clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }
        .custom-checkbox:checked { background-color: #6366f1; border-color: #6366f1; }
        .custom-checkbox:checked::before { transform: scale(1); }
    </style>
</head>
<body class="text-slate-600 text-sm selection:bg-indigo-100 selection:text-indigo-700">
    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-24 left-1/2 -translate-x-1/2 z-[100] flex flex-col items-center gap-2 pointer-events-none"></div>

    <div id="login-view" class="fixed inset-0 z-50 bg-white flex flex-col justify-center items-center p-8 animate-fade-in max-w-md mx-auto h-full">
        <div class="mb-12 text-center w-full">
            <img src="https://i.ibb.co/PvVffGgL/image.png" class="w-full max-w-[280px] h-auto object-contain drop-shadow-xl mb-6 mx-auto hover:scale-105 transition-transform duration-500">
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">雲端記帳 <span class="text-primary text-lg">Lite</span></h1>
            <p class="text-slate-400 mt-3 text-sm font-medium">簡單、直覺的個人財務管家</p>
        </div>
        <div class="w-full space-y-3">
            <button onclick="App.loginGoogle()" class="w-full bg-white border border-slate-200 text-slate-700 py-4 rounded-2xl font-bold shadow-soft hover:bg-slate-50 flex items-center justify-center gap-3 transition-all active:scale-[0.98]"><i class="fa-brands fa-google text-red-500 text-lg"></i> 使用 Google 繼續</button>
            <button onclick="App.loginAnon()" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold shadow-float hover:bg-slate-900 transition-all active:scale-[0.98]">訪客體驗</button>
        </div>
        <p class="absolute bottom-8 text-xs text-slate-300 tracking-wider">Designed for Will Studio</p>
    </div>

    <div id="app-container" class="hidden app-frame">
        <header class="bg-white/80 backdrop-blur-md sticky top-0 px-5 py-4 flex justify-between items-center z-20 shrink-0 border-b border-slate-100/50">
            <div class="flex items-center gap-3">
                <img id="header-icon" src="https://i.ibb.co/PvVffGgL/image.png" class="h-10 w-auto object-contain">
                <div>
                    <p id="greeting-text" class="text-[10px] font-bold text-slate-400"></p>
                    <h1 class="font-bold text-slate-800 text-lg leading-tight" id="page-title">總覽</h1>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="App.openNotificationModal()" class="relative text-slate-400 hover:text-primary p-2 rounded-full hover:bg-slate-50 transition group"><i class="fa-solid fa-bell text-lg group-active:scale-95"></i><span id="notification-badge" class="absolute top-1.5 right-1.5 w-2.5 h-2.5 bg-rose-500 rounded-full border-2 border-white hidden animate-bounce"></span></button>
                <div id="user-info" class="hidden sm:block text-xs font-bold text-slate-500 bg-slate-100 px-3 py-1.5 rounded-xl"></div>
                <button onclick="App.logout()" class="text-slate-300 hover:text-danger p-2 rounded-full hover:bg-rose-50 transition"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </header>

        <main id="main-content" class="flex-1 overflow-y-auto hide-scrollbar relative px-4 pt-4">
            <div id="view-accounting" class="view-section animate-fade-in space-y-4"></div>
            <div id="view-stock" class="view-section hidden animate-fade-in space-y-4"></div>
            <div id="view-investment" class="view-section hidden animate-fade-in space-y-4"></div>
            <div id="view-debt" class="view-section hidden animate-fade-in space-y-4"></div>
            <div id="view-reports" class="view-section hidden animate-fade-in space-y-4"></div>
            <div id="view-events" class="view-section hidden animate-fade-in space-y-4"></div>
        </main>

        <nav class="absolute bottom-0 w-full glass pb-safe pt-2 z-30 border-t border-white/60 shadow-[0_-4px_20px_rgba(0,0,0,0.02)]">
            <div class="flex justify-between items-center px-2 nav-scroll hide-scrollbar min-w-full gap-2">
                <button id="nav-accounting" onclick="App.switchTab('accounting',this)" class="nav-item active flex flex-col items-center gap-1.5 p-2 min-w-[3.2rem] flex-shrink-0"><i class="fa-solid fa-house text-lg mb-0.5"></i> 記帳</button>
                <button onclick="App.switchTab('stock',this)" class="nav-item flex flex-col items-center gap-1.5 p-2 min-w-[3.2rem] flex-shrink-0"><i class="fa-solid fa-arrow-trend-up text-lg mb-0.5"></i> 股市</button>
                <button onclick="App.switchTab('investment',this)" class="nav-item flex flex-col items-center gap-1.5 p-2 min-w-[3.2rem] flex-shrink-0"><i class="fa-solid fa-piggy-bank text-lg mb-0.5"></i> 資產</button>
                
                <div class="relative -top-6 mx-1 flex-shrink-0">
                    <button onclick="App.handleFabClick()" class="fab-btn w-14 h-14 rounded-full text-white text-2xl flex items-center justify-center hover:-translate-y-1 active:scale-95"><i class="fa-solid fa-plus"></i></button>
                </div>

                <button onclick="App.switchTab('debt',this)" class="nav-item flex flex-col items-center gap-1.5 p-2 min-w-[3.2rem] flex-shrink-0"><i class="fa-solid fa-file-invoice-dollar text-lg mb-0.5"></i> 負債</button>
                <button onclick="App.switchTab('events',this)" class="nav-item flex flex-col items-center gap-1.5 p-2 min-w-[3.2rem] flex-shrink-0"><i class="fa-solid fa-calendar-day text-lg mb-0.5"></i> 大事</button>
                <button onclick="App.switchTab('reports',this)" class="nav-item flex flex-col items-center gap-1.5 p-2 min-w-[3.2rem] flex-shrink-0"><i class="fa-solid fa-chart-pie text-lg mb-0.5"></i> 報表</button>
            </div>
        </nav>
    </div>

    <!-- Modals -->
    <!-- Added onclick to close modal when clicking outside -->
    <div id="modal-overlay" class="fixed inset-0 bg-slate-900/50 z-50 hidden flex items-end sm:items-center justify-center backdrop-blur-sm transition-opacity duration-300" onclick="if(event.target === this) App.closeModal()">
        <div id="modal-content" class="bg-white w-full max-w-[28rem] rounded-t-[2rem] sm:rounded-2xl p-6 shadow-float animate-slide-up sm:animate-fade-in max-h-[90vh] overflow-y-auto hide-scrollbar relative pb-10"><div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6 sm:hidden"></div></div>
    </div>
    <div id="sub-modal-overlay" class="fixed inset-0 bg-slate-900/40 z-[60] hidden flex items-end sm:items-center justify-center backdrop-blur-sm transition-all" onclick="if(event.target === this) App.closeSubModal()">
        <div id="sub-modal-content" class="bg-white w-full max-w-[28rem] rounded-t-[2rem] sm:rounded-2xl p-6 shadow-float animate-slide-up max-h-[70vh] overflow-y-auto hide-scrollbar"></div>
    </div>

    <!-- TEMPLATES -->
    <template id="tpl-notifications"><div class="flex justify-between items-center mb-6"><h3 class="text-xl font-bold text-slate-800">提醒事項</h3><button onclick="App.closeModal()" class="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 hover:bg-slate-200"><i class="fa-solid fa-xmark"></i></button></div><div id="notification-list" class="space-y-3 pb-4"></div><div id="no-notification" class="hidden text-center py-10"><div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-3 text-slate-300"><i class="fa-regular fa-bell-slash text-xl"></i></div><p class="text-slate-400 text-sm">目前沒有待辦事項</p></div></template>

    <template id="tpl-accounting">
        <div class="gradient-card rounded-[2rem] p-6 shadow-float relative overflow-hidden mb-5">
            <div class="absolute top-0 right-0 w-40 h-40 bg-white/10 rounded-full blur-2xl -mr-10 -mt-10"></div><div class="absolute bottom-0 left-0 w-32 h-32 bg-black/10 rounded-full blur-xl -ml-10 -mb-5"></div>
            <div id="acc-overdue-badge" class="absolute -top-1 -left-1 hidden z-20 animate-pulse-fast"><div class="bg-rose-500 text-white text-[10px] font-bold px-3 py-1.5 rounded-br-2xl rounded-tl-xl shadow-md border-b-2 border-r-2 border-rose-700/30">⚠️ 逾期未收 <span id="acc-overdue-val"></span></div></div>
            <div id="acc-pending-income-badge" class="absolute bottom-0 right-0 hidden z-20"><div class="bg-white/20 backdrop-blur-sm text-white text-[10px] font-bold px-3 py-1.5 rounded-tl-2xl shadow-sm border-t border-l border-white/20">📅 本月預期 <span id="acc-pending-income-val"></span></div></div>
            <div class="relative z-10">
                <div class="flex justify-between items-center mb-6"><span class="text-indigo-100 text-xs font-medium bg-white/10 px-3 py-1.5 rounded-xl backdrop-blur-sm border border-white/10">本月概況</span><div class="relative"><input type="month" id="date-filter" class="bg-white/20 text-white border-none rounded-xl px-3 py-1.5 text-sm font-bold focus:ring-2 focus:ring-white/50 cursor-pointer pl-9 backdrop-blur-sm placeholder-white" onchange="App.renderTransactions(true)"><i class="fa-regular fa-calendar absolute left-3 top-1/2 -translate-y-1/2 text-sm text-indigo-100 pointer-events-none"></i></div></div>
                <div class="flex flex-col items-center mb-6"><span class="text-indigo-100 text-sm mb-1">本月結餘</span><span id="monthly-balance" class="text-5xl font-black tracking-tight text-white drop-shadow-md">0</span></div>
                <div class="grid grid-cols-2 gap-4"><div class="bg-white/10 backdrop-blur-sm rounded-2xl p-3 border border-white/10 text-center"><p class="text-[10px] opacity-80 mb-1">總收入</p><p id="monthly-income" class="text-lg font-bold">0</p></div><div class="bg-white/10 backdrop-blur-sm rounded-2xl p-3 border border-white/10 text-center"><p class="text-[10px] opacity-80 mb-1">總支出</p><p id="monthly-expense" class="text-lg font-bold">0</p></div></div>
            </div>
        </div>
        <div class="flex items-center justify-between px-2 pt-1 mb-3"><span class="text-sm font-bold text-slate-500">本日小計</span><div class="flex gap-2 text-xs font-bold"><span class="text-emerald-600 bg-emerald-50 px-2.5 py-1 rounded-lg">收 <span id="today-income">0</span></span><span class="text-rose-500 bg-rose-50 px-2.5 py-1 rounded-lg">支 <span id="today-expense">0</span></span><span class="text-slate-500 bg-slate-100 px-2.5 py-1 rounded-lg" id="today-balance-container">餘 <span id="today-balance">0</span></span></div></div>
        <ul id="tx-list" class="space-y-4 pb-6"></ul>
        <div class="mt-8 pb-4"><div class="flex justify-between items-center px-1 mb-3"><span class="text-xs font-bold text-slate-400 uppercase tracking-wider">預算 / 排程</span><button onclick="App.openBudgetModal('accounting')" class="text-primary text-[10px] font-bold bg-indigo-50 px-3 py-1.5 rounded-xl hover:bg-indigo-100 transition"><i class="fa-solid fa-plus"></i> 新增排程</button></div><ul id="accounting-budget-list" class="space-y-2"></ul></div>
    </template>

    <template id="tpl-stock">
        <div class="bg-slate-800 text-white p-6 rounded-[2rem] shadow-float mb-5 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-40 h-40 bg-primary/20 rounded-full blur-2xl -mr-10 -mt-10"></div>
            <div class="relative z-10 flex justify-between items-start">
                <div>
                    <p class="text-slate-400 text-sm font-medium mb-1">股市總資產</p>
                    <h2 id="stock-total-assets" class="text-4xl font-black tracking-tight mb-4">--</h2>
                    <div class="flex gap-5 border-t border-slate-700/50 pt-4">
                        <div><span class="text-slate-400 text-xs block mb-1">總損益</span><span id="stock-total-pl" class="font-bold text-base">--</span></div>
                        <div><span class="text-slate-400 text-xs block mb-1">報酬率</span><span id="stock-roi" class="font-bold text-base">--</span></div>
                    </div>
                </div>
                <div class="text-right">
                    <div class="bg-white/10 backdrop-blur-sm rounded-2xl p-3 border border-white/10 text-center mb-3">
                        <p class="text-xs text-slate-300 mb-1">本月投入資金</p>
                        <p id="stock-monthly-invest" class="text-xl font-bold text-emerald-400">0</p>
                    </div>
                    <p class="text-xs text-slate-400">總成本: <span id="stock-total-cost" class="font-medium text-slate-200">--</span></p>
                    <p class="text-xs text-slate-400 mt-1">已實現: <span id="stock-realized-pl">--</span></p>
                </div>
            </div>
        </div>
        
        <div class="flex justify-between items-center mb-4 px-1">
            <h3 class="font-bold text-slate-700 text-base">持股明細</h3>
            <div class="flex gap-2">
                <button onclick="App.copyStockReport()" class="w-9 h-9 rounded-xl bg-indigo-50 text-primary hover:bg-indigo-100 flex items-center justify-center transition active:scale-95" title="複製紀錄"><i class="fa-solid fa-copy text-sm"></i></button>
                <button onclick="App.exportStockReport()" class="w-9 h-9 rounded-xl bg-indigo-50 text-primary hover:bg-indigo-100 flex items-center justify-center transition active:scale-95" title="匯出 CSV"><i class="fa-solid fa-file-export text-sm"></i></button>
                <button id="btn-update-all" onclick="App.updateAllStockPrices()" class="bg-indigo-50 text-primary text-xs font-bold px-3 py-2 rounded-xl hover:bg-indigo-100 transition flex items-center gap-1.5 active:scale-95"><i class="fa-solid fa-rotate"></i> 更新股價</button>
            </div>
        </div>
        
        <div id="stock-list" class="space-y-3"></div>
        <div class="h-20"></div>
    </template>

    <template id="tpl-investment">
        <div class="sticky top-0 z-10 bg-[#f8fafc]/90 backdrop-blur-md pb-2 -mt-2 pt-2 flex justify-between items-center mb-2 px-1"><h3 class="text-lg font-bold text-slate-700">其他資產</h3><input type="month" id="inv-date-filter" class="bg-white border border-slate-100 rounded-xl px-3 py-2 text-sm font-bold text-slate-600 shadow-sm outline-none" onchange="App.renderInvestments()"></div>
        <div class="bg-white p-6 rounded-[2rem] shadow-float border border-slate-100 relative overflow-hidden mb-5">
            <div class="relative z-10"><p class="text-slate-400 text-sm font-medium mb-1">資產總淨值</p><h2 id="inv-total-val" class="text-4xl font-black tracking-tight mb-4 text-slate-800">--</h2><div class="flex gap-6 border-t border-slate-100 pt-4"><div><span class="text-slate-400 text-xs block mb-1">累積損益</span><span id="inv-total-ret" class="font-bold text-base text-slate-700">--</span></div><div><span class="text-slate-400 text-xs block mb-1">整體報酬率</span><span id="inv-roi" class="font-bold text-base">--</span></div></div><div id="inv-penalty-summary" class="mt-4 pt-3 border-t border-slate-100 flex items-center justify-between text-rose-500 hidden bg-rose-50 -mx-6 -mb-6 px-6 pb-6 rounded-b-[2rem]"><span class="text-xs font-bold"><i class="fa-solid fa-circle-exclamation mr-1"></i> 待收罰金</span><span class="font-bold text-base" id="inv-total-penalty">$0</span></div></div>
        </div>
        <div class="flex justify-between items-center mb-4"><div class="bg-slate-100 p-1 rounded-xl shadow-inner inline-flex"><button class="tab-pill px-4 py-2 rounded-lg text-xs font-bold text-slate-500 transition-all active bg-white text-primary shadow-sm" onclick="App.switchInvTab('active',this)">進行中</button><button class="tab-pill px-4 py-2 rounded-lg text-xs font-bold text-slate-500 transition-all hover:text-slate-700" onclick="App.switchInvTab('archived',this)">已結案</button></div><button onclick="App.openModal('investment-modal')" class="text-primary text-xs font-bold bg-indigo-50 px-4 py-2.5 rounded-xl hover:bg-indigo-100 flex items-center gap-1.5 transition active:scale-95"><i class="fa-solid fa-plus"></i> 新增帳戶</button></div>
        <span id="inv-monthly-summary" class="block text-center text-sm font-bold text-slate-500 mb-4 bg-white py-2 rounded-xl shadow-sm border border-slate-50">本月收益: $0</span>
        <div id="inv-list" class="grid gap-3"></div>
        <div class="mt-8"><div class="flex justify-between items-center px-1 mb-3"><span class="text-xs font-bold text-slate-400 uppercase tracking-wider">定期定額 / 預期收入</span><div class="flex gap-2"><select id="inv-budget-filter-select" class="bg-white border border-slate-100 rounded-lg px-2 py-1 text-xs font-bold text-slate-500 outline-none shadow-sm" onchange="App.renderInvestments()"><option value="all">全部</option></select><button onclick="App.openBudgetModal('investment')" class="text-secondary text-[10px] font-bold bg-emerald-50 px-3 py-1.5 rounded-xl hover:bg-emerald-100 transition"><i class="fa-solid fa-plus"></i> 新增排程</button></div></div><ul id="inv-budget-list" class="space-y-2"></ul></div>
    </template>

    <template id="tpl-debt">
         <div class="sticky top-0 z-10 bg-[#f8fafc]/90 backdrop-blur-md pb-2 -mt-2 pt-2 flex justify-between items-center mb-2 px-1"><h3 class="text-lg font-bold text-slate-700">負債管理</h3><input type="month" id="debt-date-filter" class="bg-white border border-slate-100 rounded-xl px-3 py-2 text-sm font-bold text-slate-600 shadow-sm outline-none" onchange="App.renderDebts()"></div>
        <div class="bg-white p-6 rounded-[2rem] shadow-float border-l-4 border-warning mb-5 relative overflow-hidden">
             <div class="flex justify-between items-end mb-5 relative z-10"><div><p class="text-sm text-slate-400 font-medium mb-1">剩餘總負債</p><p id="debt-total-remaining" class="text-4xl font-black text-slate-800 tracking-tight">--</p></div><div class="text-right"><p class="text-xs text-slate-400 mb-1">整體還款進度</p><p id="debt-progress-text" class="text-2xl font-bold text-warning">0%</p></div></div>
            <div class="w-full bg-slate-100 rounded-full h-4 overflow-hidden relative z-10 shadow-inner"><div id="debt-progress-bar" class="bg-warning h-full rounded-full transition-all duration-1000 ease-out relative" style="width:0%"><div class="absolute inset-0 bg-white/30 w-full h-full animate-[pulse_2s_infinite]"></div></div></div><div class="absolute right-0 bottom-0 w-40 h-40 bg-warning/5 rounded-full blur-2xl -mr-10 -mb-10"></div>
        </div>

        const FIREBASE_API_KEY = "AIzaSyAqFHm6Bn35m8xauc50ZvNNy_rxIZzCMTE";
        const GEMINI_API_KEY = "AIzaSyAze_WqtUmWv7i2xwQHosePZtUI9NZvr0w";
        
        const App = window.App = {};
        
        try {
            const app=initializeApp({apiKey:FIREBASE_API_KEY,authDomain:"moneyw-f8105.firebaseapp.com",projectId:"moneyw-f8105",storageBucket:"moneyw-f8105.appspot.com",messagingSenderId:"155586195799",appId:"1:155586195799:web:302184fbf613f032a88e12"});
            const auth=getAuth(app);
            const db=getFirestore(app);

            const State={user:null,data:{transactions:[],debts:[],investments:[],stocks:[],stockTxs:[],events:[],investmentBudgets:[],debtBudgets:[],accountingBudgets:[],legacyTxs:{}},listeners:[],chart:null,categories:{expense:['飲食','交通','居住','娛樂','購物','醫療','教育','投資','進修','其他'],income:['薪資','獎金','投資','兼職','其他']},view:{invTab:'active',currentTab:'accounting', txPage: 1, txPageSize: 7},reminders:[]};
            const $=i=>document.getElementById(i);
            const Q=s=>document.querySelector(s);
            const getTxDate=t=>{if(!t)return new Date();try{if(t.timestamp?.toDate)return t.timestamp.toDate();if(t.date){if(t.date.toDate)return t.date.toDate();const d=new Date(t.date);if(!isNaN(d))return d}if(t.timestamp?.seconds)return new Date(t.timestamp.seconds*1000)}catch(e){}return new Date()};
            const toDateStr=d=>{const dt=(d instanceof Date)?d:getTxDate({timestamp:d});return dt.toISOString().split('T')[0]};
            const STOCK_MAP = {
                '0050':'元大台灣50','0056':'元大高股息','00878':'國泰永續高股息','00929':'復華台灣科技優息','00919':'群益台灣精選高息','00940':'元大台灣價值高息','006208':'富邦台50','2330':'台積電','2317':'鴻海','2337':'旺宏','2454':'聯發科','2308':'台達電','2382':'廣達','2881':'富邦金','2882':'國泰金','2412':'中華電','1301':'台塑','1303':'南亞','2002':'中鋼','2303':'聯電','2891':'中信金','2886':'兆豐金','2884':'玉山金','2892':'第一金','5880':'合庫金','2885':'元大金','2880':'華南金','2883':'開發金','2887':'台新金','2890':'永豐金','1216':'統一','2912':'統一超','3008':'大立光','1101':'台泥','1102':'亞泥','2327':'國巨','2357':'華碩','2395':'研華','3045':'台灣大','4904':'遠傳','2603':'長榮','2609':'陽明','2615':'萬海','9910':'豐泰','9904':'寶成','1402':'遠東新','6505':'台塑化','2408':'南亞科','2344':'華邦電','2409':'友達','3481':'群創','2353':'宏碁','2324':'仁寶','3231':'緯創','3711':'日月光投控','5871':'中租-KY','1605':'華新','2379':'瑞昱','3034':'聯詠','2345':'智邦','2377':'微星','2301':'光寶科','4938':'和碩','3037':'欣興','2474':'可成','4958':'臻鼎-KY','6415':'矽力-KY','2492':'華新科'
            };

            // --- Enhanced UX: Toast Notification ---
            App.showToast = (msg, type = 'success') => {
                const tc = $('toast-container');
                const t = document.createElement('div');
                const icon = type === 'success' ? 'fa-circle-check text-emerald-400' : (type === 'error' ? 'fa-circle-exclamation text-rose-400' : 'fa-info-circle text-blue-400');
                t.className = `bg-slate-800 text-white px-5 py-3 rounded-2xl shadow-float text-sm font-bold flex items-center gap-3 animate-toast-enter pointer-events-auto transition-all duration-300`;
                t.innerHTML = `<i class="fa-solid ${icon} text-lg"></i> ${msg}`;
                tc.appendChild(t);
                setTimeout(() => {
                    t.style.opacity = '0';
                    t.style.transform = 'translate(0, 20px)';
                    setTimeout(() => t.remove(), 300);
                }, 3000);
            };

            // Enhanced Greeting
            App.updateGreeting = (name) => {
                const hr = new Date().getHours();
                let greet = '晚安';
                if (hr >= 5 && hr < 12) greet = '早安';
                else if (hr >= 12 && hr < 18) greet = '午安';
                const n = name === '訪客' ? '朋友' : (name.includes('Wilson') || name.includes('威爾') ? '威爾' : name.split(' ')[0]);
                $('greeting-text').innerText = `${greet}，${n}`;
            };

            // Enhanced Add Amount
            App.addAmount = (val) => {
                const inp = $('tx-amount-input');
                if(!inp) return;
                const current = parseFloat(inp.value) || 0;
                inp.value = current + val;
            };

            // Enhanced Quick Category
            App.quickCategory = (val) => {
                const inp = $('tx-category-input');
                if(inp) inp.value = val;
            };

            // --- App Implementation ---
            App.init = () => onAuthStateChanged(auth, u => {
                State.user = u;
                $('login-view').classList.toggle('hidden', !!u);
                $('app-container').classList.toggle('hidden', !u);
                if (u) {
                    const dispName = u.isAnonymous ? '訪客' : u.displayName;
                    $('user-info').innerText = dispName;
                    App.updateGreeting(dispName);
                    App.switchTab('accounting', Q('#nav-accounting'));
                    setTimeout(() => App.startListeners(u.uid), 100);
                    if(!u.isAnonymous) App.showToast('登入成功，歡迎回來！');
                } else App.stopListeners();
            });

            App.startListeners = uid => {
                const l = (c, k) => State.listeners.push(onSnapshot(query(collection(db, `users/${uid}/${c}`)), s => {
                    State.data[k] = s.docs.map(d => ({ id: d.id, ...d.data() }));
                    App.calculateReminders();
                    App.refreshCurrentView();
                    if (k === 'debts') App.processAutoInterest(State.data.debts, 'debt');
                }));
                ['transactions', 'debts', 'events', 'debtBudgets', 'accountingBudgets', 'stocks', 'stockTransactions'].forEach(k => l(k, k === 'stockTransactions' ? 'stockTxs' : k));
                
                State.listeners.push(onSnapshot(query(collection(db, `users/${uid}/debtBudgets`)), s => {
                    const list = s.docs.map(d => ({ id: d.id, ...d.data() }));
                    State.data.debtBudgets = list;
                    App.checkAutoBudgetItems(list, 'debt');
                    App.calculateReminders();
                    App.refreshCurrentView();
                }));

                State.listeners.push(onSnapshot(query(collection(db, `users/${uid}/investmentBudgets`)), s => {
                    const list = s.docs.map(d => ({ id: d.id, ...d.data() }));
                    State.data.investmentBudgets = list;
                    App.checkAutoBudgetItems(list, 'investment');
                    App.calculateReminders();
                    App.refreshCurrentView();
                }));
                
                State.listeners.push(onSnapshot(query(collection(db, `users/${uid}/investments`)), async s => {
                    State.data.investments = s.docs.map(d => ({ id: d.id, ...d.data() }));
                    App.processAutoInterest(State.data.investments, 'investment');
                    for (let i of State.data.investments) {
                        if (!State.data.legacyTxs[i.id]) try {
                            const sub = await getDocs(collection(db, `users/${uid}/investments/${i.id}/transactions`));
                            State.data.legacyTxs[i.id] = sub.docs.map(d => {
                                const v = d.data();
                                return { id: d.id, ...v, timestamp: v.timestamp || v.date || Timestamp.now(), isLegacy: true, legacyInvId: i.id };
                            });
                        } catch (e) { State.data.legacyTxs[i.id] = []; }
                    }
                    App.refreshCurrentView();
                }));
            };

            App.calculateReminders = () => {
                const t = new Date(); t.setHours(0, 0, 0, 0); const l = new Date(t); l.setDate(t.getDate() + 3);
                const all = [...State.data.accountingBudgets.map(b => ({ ...b, s: 'accounting', l: '記帳' })), ...State.data.investmentBudgets.map(b => ({ ...b, s: 'investment', l: '投資' })), ...State.data.debtBudgets.map(b => ({ ...b, s: 'debt', l: '負債' }))];
                State.reminders = all.filter(b => !b.isRealized && getTxDate({ timestamp: b.expectedDate }) <= l).sort((a, b) => getTxDate({ timestamp: a.expectedDate }) - getTxDate({ timestamp: b.expectedDate }));
                const bg = $('notification-badge'); State.reminders.length ? bg.classList.remove('hidden') : bg.classList.add('hidden');
            };

            App.openNotificationModal = () => {
                const c = $('modal-content'); c.innerHTML = $('tpl-notifications').innerHTML;
                const l = c.querySelector('#notification-list');
                if (!State.reminders.length) {
                    l.classList.add('hidden'); c.querySelector('#no-notification').classList.remove('hidden');
                } else {
                    const t = new Date(); t.setHours(0, 0, 0, 0);
                    l.innerHTML = State.reminders.map(r => {
                        const d = getTxDate({ timestamp: r.expectedDate }); d.setHours(0, 0, 0, 0);
                        let s = '即將到期', sc = 'text-slate-500 bg-slate-50 border-slate-100', ic = 'fa-calendar-day';
                        if (d < t) { s = '已逾期'; sc = 'text-rose-500 bg-rose-50 border-rose-100'; ic = 'fa-circle-exclamation'; }
                        else if (d.getTime() === t.getTime()) { s = '今天到期'; sc = 'text-amber-500 bg-amber-50 border-amber-100'; ic = 'fa-clock'; }
                        let n = r.targetId; if (r.s === 'investment') n = State.data.investments.find(i => i.id === r.targetId)?.name || '未知'; if (r.s === 'debt') n = State.data.debts.find(d => d.id === r.targetId)?.name || '未知';
                        return `<div class="flex items-center gap-3 p-3 rounded-2xl border ${sc} cursor-pointer hover:shadow-sm transition active:scale-[0.98]" onclick="App.openBudgetModal('${r.s}','${r.id}');App.closeModal()"><div class="w-12 h-12 rounded-full bg-white flex items-center justify-center shadow-sm shrink-0"><i class="fa-solid ${ic} text-xl ${sc.split(' ')[0]}"></i></div><div class="flex-1 min-w-0"><div class="flex justify-between items-center mb-0.5"><span class="text-[10px] font-bold px-2 py-0.5 rounded-md bg-white/60 ${sc.split(' ')[0]}">${s}</span><span class="text-xs text-slate-400 font-mono">${toDateStr(d)}</span></div><div class="flex justify-between items-center"><h4 class="font-bold text-slate-700 text-sm truncate pr-2">${r.description || n}</h4><span class="font-black text-slate-800 text-sm whitespace-nowrap">$${parseFloat(r.amount).toLocaleString()}</span></div><p class="text-[10px] text-slate-400 mt-0.5">分類: ${r.l}</p></div></div>`;
                    }).join('');
                }
                $('modal-overlay').classList.remove('hidden'); $('modal-overlay').classList.add('flex');
            };

            // Enhanced Auto Logic (Kept intact)
            App.checkAutoBudgetItems = async (list, type) => {
                const b = writeBatch(db), t = new Date(); t.setHours(0, 0, 0, 0); let has = false;
                const ex = list.filter(x => x.isPenalty || x.isRecurringItem);
                const colName = type === 'investment' ? 'investmentBudgets' : 'debtBudgets';
                
                for (const i of list) {
                    if (!i.isPenalty && !i.isRealized && i.enablePenalty && i.dailyPenalty > 0) {
                        const e = getTxDate({ timestamp: i.expectedDate }); e.setHours(0, 0, 0, 0);
                        if (t > e) {
                            let c = new Date(e); c.setDate(c.getDate() + 1);
                            while (c <= t) {
                                if (!ex.some(p => p.isPenalty && p.parentBudgetId === i.id && getTxDate({ timestamp: p.expectedDate }).getTime() === c.getTime())) {
                                    b.set(doc(collection(db, `users/${State.user.uid}/${colName}`)), { targetId: i.targetId, parentBudgetId: i.id, amount: parseFloat(i.dailyPenalty), expectedDate: Timestamp.fromDate(new Date(c)), description: `[罰金] ${i.description} (${c.getMonth() + 1}/${c.getDate()})`, type: type === 'investment' ? 'income' : 'expense', isRealized: false, isPenalty: true, createdAt: Timestamp.now() }); 
                                    has = true;
                                }
                                c.setDate(c.getDate() + 1);
                            }
                        }
                    }
                    if (i.enableRecurring && i.recurringDays > 0 && !i.isRecurringItem) {
                        let ld = i.lastRecurringDate ? getTxDate({ timestamp: i.lastRecurringDate }) : getTxDate({ timestamp: i.expectedDate }); ld.setHours(0, 0, 0, 0);
                        let nd = new Date(ld); nd.setDate(nd.getDate() + parseInt(i.recurringDays));
                        while (nd <= t) {
                            if (!ex.some(x => x.isRecurringItem && x.parentBudgetId === i.id && getTxDate({ timestamp: x.expectedDate }).getTime() === nd.getTime())) {
                                b.set(doc(collection(db, `users/${State.user.uid}/${colName}`)), { targetId: i.targetId, parentBudgetId: i.id, amount: parseFloat(i.amount), expectedDate: Timestamp.fromDate(new Date(nd)), description: `[自動] ${i.description} (${nd.getMonth() + 1}/${nd.getDate()})`, type: i.type || (type === 'investment' ? 'income' : 'expense'), isRealized: false, isRecurringItem: true, createdAt: Timestamp.now() });
                                b.update(doc(db, `users/${State.user.uid}/${colName}`, i.id), { lastRecurringDate: Timestamp.fromDate(new Date(nd)) }); 
                                has = true;
                            }
                            nd.setDate(nd.getDate() + parseInt(i.recurringDays));
                        }
                    }
                }
                if (has) await b.commit();
            };

            App.processAutoInterest = async (items, type) => {
                const now = new Date(); const currentMonthKey = `${now.getFullYear()}-${now.getMonth() + 1}`; const b = writeBatch(db); let has = false; const colName = type === 'investment' ? 'investmentBudgets' : 'debtBudgets'; const budgetList = State.data[colName] || [];
                for (const item of items) {
                    if (item.annualRate && parseFloat(item.annualRate) > 0) {
                        const alreadyExists = budgetList.some(budget => budget.targetId === item.id && budget.isAutoInterest && budget.forMonth === currentMonthKey);
                        if (!alreadyExists) {
                            const principal = type === 'investment' ? (parseFloat(item.marketValue) || parseFloat(item.initialValue)) : parseFloat(item.remainingAmount);
                            const monthlyRate = parseFloat(item.annualRate) / 100 / 12;
                            const interestAmount = Math.round(principal * monthlyRate);
                            if (interestAmount > 0) {
                                b.set(doc(collection(db, `users/${State.user.uid}/${colName}`)), { targetId: item.id, amount: interestAmount, expectedDate: Timestamp.now(), description: `[自動利息] ${currentMonthKey} (${item.annualRate}%)`, type: type === 'investment' ? 'income' : 'expense', isRealized: false, isAutoInterest: true, forMonth: currentMonthKey, createdAt: Timestamp.now() });
                                has = true;
                            }
                        }
                    }
                }
                if (has) await b.commit();
            };

            App.stopListeners = () => { State.listeners.forEach(u => u()); State.listeners = []; };
            App.loginGoogle = () => signInWithPopup(auth, new GoogleAuthProvider());
            App.loginAnon = () => signInAnonymously(auth);

            App.renderDebts = () => {if(!$('debt-list'))return;const mv=$('debt-date-filter').value,[yr,mn]=mv?mv.split('-').map(Number):[new Date().getFullYear(),new Date().getMonth()+1],sm=new Date(yr,mn-1,1),em=new Date(yr,mn,0,23,59,59),ds=State.data.debts.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));let tr=0,tm=0,to=0,trem=0;ds.forEach(d=>{to+=parseFloat(d.totalAmount)||0;trem+=parseFloat(d.remainingAmount)||0});const gp=to>0?Math.round(((to-trem)/to)*100):0;$('debt-list').innerHTML=ds.map(d=>{tr+=parseFloat(d.remainingAmount);const p=Math.round(((d.totalAmount-d.remainingAmount)/d.totalAmount)*100),mr=State.data.transactions.filter(t=>t.type==='expense'&&t.project===d.name).reduce((s,t)=>{const dt=getTxDate(t);return(dt>=sm&&dt<=em)?s+(parseFloat(t.amount)||0):s},0);tm+=mr;const md=mr>0?`<span class="text-xs text-emerald-600 font-bold bg-emerald-50 px-2 py-0.5 rounded-lg border border-emerald-100">本月已還: $${mr.toLocaleString()}</span>`:'';return`<div class="bg-white p-5 rounded-[1.5rem] shadow-sm border border-slate-100 cursor-pointer active:scale-[0.99] transition relative group hover:shadow-md" onclick="App.showDetails('debt','${d.id}')"><div class="flex justify-between mb-3"><span class="font-black text-slate-700 text-base">${d.name}</span><div class="flex items-center gap-2">${md}<span class="text-sm font-bold text-warning bg-amber-50 px-2 py-0.5 rounded-lg">${p}%</span></div></div><div class="w-full bg-slate-100 rounded-full h-3 mb-4 shadow-inner overflow-hidden"><div class="bg-warning h-3 rounded-full relative" style="width:${p}%"><div class="absolute inset-0 bg-white/30 w-full h-full animate-[pulse_2s_infinite]"></div></div></div><div class="flex justify-between items-end"><div class="text-xs text-slate-400">剩餘 <span class="text-slate-800 font-black text-lg ml-1">$${d.remainingAmount.toLocaleString()}</span></div><div class="flex gap-2 relative z-10"><button onclick="event.stopPropagation();App.openRepayModal('${d.id}','${d.name}')" class="text-sm bg-emerald-50 text-emerald-600 font-bold px-4 py-2 rounded-xl hover:bg-emerald-100 transition active:scale-95 shadow-sm">快速還款</button></div></div><button onclick="event.stopPropagation();App.openModal('debt-modal','${d.id}')" class="absolute top-5 right-5 text-slate-300 hover:text-primary opacity-0 sm:group-hover:opacity-100 transition"><i class="fa-solid fa-pen text-sm"></i></button></div>`}).join('');$('debt-total-remaining').innerText=`$${tr.toLocaleString()}`;$('debt-monthly-summary').innerText=`本月還款: $${tm.toLocaleString()}`;$('debt-progress-text').innerText=`${gp}%`;$('debt-progress-bar').style.width=`${gp}%`;
            $('debt-budget-list').innerHTML=State.data.debtBudgets.filter(b=>!b.isRealized).sort((a,b)=>(a.expectedDate?.seconds||0)-(b.expectedDate?.seconds||0)).map(b=>{ const dateStr = toDateStr(b.expectedDate); const tName = State.data.debts.find(d=>d.id===b.targetId)?.name||'未知'; const isP = b.isAutoInterest || b.isPenalty; const rowBg = isP ? 'bg-indigo-50 border-indigo-200' : (b.expectedDate?.toDate()<new Date().setHours(0,0,0,0)?'bg-rose-50 border-rose-100':'bg-white border-slate-100'); return `<li class="flex justify-between items-center p-4 rounded-2xl border shadow-sm mb-3 ${rowBg} hover:shadow-md transition"><div class="flex items-center gap-3"><div class="w-1.5 bg-warning h-10 rounded-full"></div><div><span class="font-bold text-slate-700 text-sm block mb-0.5">${tName}</span><div class="flex gap-2 text-xs text-slate-400"><span>${dateStr}</span><span>${b.description}</span></div></div></div><div class="flex flex-col items-end mr-2"><span class="font-black text-rose-500 text-sm">$${(parseFloat(b.amount)||0).toLocaleString()}</span></div><div class="flex gap-2"><button onclick="App.realizeBudget('debt','${b.id}')" class="w-9 h-9 rounded-full bg-emerald-50 text-emerald-600 hover:bg-emerald-100 flex items-center justify-center transition active:scale-95"><i class="fa-solid fa-check text-sm"></i></button><button onclick="App.openBudgetModal('debt','${b.id}')" class="w-9 h-9 rounded-full bg-slate-50 text-slate-400 hover:bg-slate-100 flex items-center justify-center transition active:scale-95"><i class="fa-solid fa-pen text-sm"></i></button></div></li>`}).join('')||'<li class="text-sm text-slate-400 text-center py-6 border-2 border-dashed border-slate-200 rounded-2xl">尚無還款計畫</li>'};
            
            App.renderReports = () => {if(!$('report-project'))return;const tx=App.getAllTransactions(),ps=$('report-project'),cs=$('report-category'),cp=ps.value,cc=cs.value,pr=[...new Set(tx.map(t=>t.project).filter(Boolean))].sort();ps.innerHTML='<option value="all">全部專案</option>'+pr.map(p=>`<option value="${p}">${p}</option>`).join('');if(pr.includes(cp))ps.value=cp;const ct=[...new Set(tx.map(t=>t.category).filter(Boolean))].sort();cs.innerHTML='<option value="all">全部分類</option>'+ct.map(c=>`<option value="${c}">${c}</option>`).join('');if(ct.includes(cc))cs.value=cc;const yr=parseInt($('report-year').value),mv=$('report-month-select').value;let s,e;if(mv==='all'){s=new Date(yr,0,1);e=new Date(yr,11,31,23,59,59)}else{const m=parseInt(mv);s=new Date(yr,m-1,1);e=new Date(yr,m,0,23,59,59)}const f=tx.filter(t=>{const d=getTxDate(t);return d>=s&&d<=e&&(ps.value==='all'||t.project===ps.value)&&(cs.value==='all'||t.category===cs.value)}).sort((a,b)=>getTxDate(b)-getTxDate(a));if(State.chart)State.chart.destroy();const m={},tot=f.filter(t=>t.type==='expense').reduce((s,t)=>{const c=t.category||'未分類';m[c]=(m[c]||0)+parseFloat(t.amount);return s+parseFloat(t.amount)},0);State.chart=new Chart($('expense-chart').getContext('2d'),{type:'doughnut',data:{labels:Object.keys(m),datasets:[{data:Object.values(m),backgroundColor:['#f43f5e','#f59e0b','#10b981','#3b82f6','#6366f1','#8b5cf6','#ec4899','#64748b'],borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,layout:{padding:10},plugins:{legend:{position:'right',labels:{font:{size:12,family:"'Noto Sans TC'"},usePointStyle:true,boxWidth:10}}}}});let html='';const im={},em={};let it=0,et=0;f.forEach(t=>{const a=parseFloat(t.amount)||0,c=t.category||'未分類';if(t.type==='expense'){em[c]=(em[c]||0)+a;et+=a}else{im[c]=(im[c]||0)+a;it+=a}});if(it>0)html+=`<li class="text-sm font-black text-emerald-600 mb-3 pb-2 mt-2 flex justify-between items-center"><span>收入統計</span><span class="bg-emerald-100 px-3 py-1 round
