<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>雲端記帳 Lite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config={theme:{extend:{colors:{primary:'#6366f1',primaryDark:'#4338ca',secondary:'#10B981',danger:'#f43f5e',warning:'#f59e0b',dark:'#1e293b',surface:'#f8fafc'},fontFamily:{sans:['Noto Sans TC','sans-serif'],mono:['Courier Prime','monospace']},boxShadow:{'soft':'0 4px 20px -2px rgba(0,0,0,0.05)','glow':'0 0 15px rgba(99,102,241,0.3)'},animation:{'slide-up':'slideUp 0.3s cubic-bezier(0.16,1,0.3,1)','fade-in':'fadeIn 0.2s ease-out','pulse-fast':'pulseFast 1.5s cubic-bezier(0.4,0,0.6,1) infinite'},keyframes:{slideUp:{'0%':{transform:'translateY(100%)'},'100%':{transform:'translateY(0)'}},fadeIn:{'0%':{opacity:'0'},'100%':{opacity:'1'}},pulseFast:{'0%,100%':{opacity:'1'},'50%':{opacity:'.7'}}}}}}
    </script>
    <style>
        body{-webkit-tap-highlight-color:transparent;background-color:#f1f5f9;font-family:'Noto Sans TC',sans-serif}
        .glass{background:rgba(255,255,255,0.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,0.8)}
        .app-frame{max-width:28rem;margin:0 auto;background-color:#f8fafc;height:100dvh;width:100%;display:flex;flex-direction:column;box-shadow:0 0 40px rgba(0,0,0,0.1);position:relative;overflow:hidden}
        @media(min-width:640px){.app-frame{height:95vh;margin-top:2.5vh;border-radius:2rem;border:8px solid #fff}}
        .hide-scrollbar::-webkit-scrollbar{display:none}.hide-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
        .fab-btn{background:linear-gradient(135deg,#6366f1 0%,#4f46e5 100%);box-shadow:0 8px 20px -4px rgba(99,102,241,0.5)}
        .gradient-card{background:linear-gradient(135deg,#4f46e5 0%,#818cf8 100%);color:white}
        .nav-item.active{color:#4f46e5}.nav-item.active::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:4px;height:4px;background-color:#4f46e5;border-radius:50%}
        .input-box{background:#f1f5f9;border:1px solid transparent;transition:all 0.2s}.input-box:focus{background:#fff;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
        .receipt-jagged{background:linear-gradient(135deg,transparent 5px,white 0) top left,linear-gradient(225deg,transparent 5px,white 0) top right;background-size:10px 10px;background-repeat:repeat-x}
        .nav-scroll { overflow-x: auto; padding-left: 0.5rem; padding-right: 0.5rem; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
        #main-content { padding-bottom: 8.5rem; } 
    </style>
</head>
<body class="text-slate-600 text-sm selection:bg-indigo-100 selection:text-indigo-700">
    <div id="login-view" class="fixed inset-0 z-50 bg-white flex flex-col justify-center items-center p-8 animate-fade-in max-w-md mx-auto h-full">
        <div class="mb-12 text-center w-full">
            <img src="https://i.ibb.co/PvVffGgL/image.png" class="w-full max-w-[320px] h-auto object-contain drop-shadow-xl mb-8 mx-auto">
            <h1 class="text-3xl font-bold text-slate-800">雲端記帳 <span class="text-primary text-lg">Lite</span></h1>
            <p class="text-slate-400 mt-3 text-sm font-medium">簡單、直覺的個人財務管家</p>
        </div>
        <div class="w-full space-y-3">
            <button onclick="App.loginGoogle()" class="w-full bg-white border border-slate-200 text-slate-700 py-3.5 rounded-2xl font-bold shadow-soft hover:bg-slate-50 flex items-center justify-center gap-3 transition-all active:scale-[0.98]"><i class="fa-brands fa-google text-red-500 text-lg"></i> 使用 Google 繼續</button>
            <button onclick="App.loginAnon()" class="w-full bg-slate-800 text-white py-3.5 rounded-2xl font-bold shadow-lg hover:bg-slate-900 transition-all active:scale-[0.98]">訪客體驗</button>
        </div>
        <p class="absolute bottom-8 text-xs text-slate-300">Designed for Wilson</p>
    </div>

    <div id="app-container" class="hidden app-frame">
        <header class="bg-white/80 backdrop-blur-md sticky top-0 px-5 py-3 flex justify-between items-center z-20 shrink-0 border-b border-slate-100/50">
            <h1 class="font-bold text-slate-800 flex items-center gap-2.5 text-lg"><img id="header-icon" src="https://i.ibb.co/PvVffGgL/image.png" class="h-10 w-auto object-contain"><span id="page-title" class="hidden">總覽</span></h1>
            <div class="flex items-center gap-3">
                <button onclick="App.openLedgerModal()" class="flex items-center gap-1.5 text-xs font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 px-3 py-1.5 rounded-lg transition group shadow-sm">
                    <i class="fa-solid fa-book-open text-primary group-active:scale-95 transition"></i> <span id="current-ledger-name" class="max-w-[70px] sm:max-w-[100px] truncate">載入中</span>
                </button>
                <button onclick="App.openNotificationModal()" class="relative text-slate-400 hover:text-primary p-1 group"><i class="fa-solid fa-bell text-lg group-active:scale-95"></i><span id="notification-badge" class="absolute top-0.5 right-0.5 w-2.5 h-2.5 bg-rose-500 rounded-full border-2 border-white hidden animate-bounce"></span></button>
                <button onclick="App.logout()" class="text-slate-400 hover:text-danger p-1"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </header>

        <main id="main-content" class="flex-1 overflow-y-auto hide-scrollbar relative px-4 pt-4">
            <div id="view-accounting" class="view-section animate-fade-in space-y-4"></div>
            <div id="view-stock" class="view-section hidden animate-fade-in space-y-4"></div>
            <div id="view-investment" class="view-section hidden animate-fade-in space-y-4"></div>
            <div id="view-debt" class="view-section hidden animate-fade-in space-y-4"></div>
            <div id="view-reports" class="view-section hidden animate-fade-in space-y-4"></div>
            <div id="view-events" class="view-section hidden animate-fade-in space-y-4"></div>
        </main>

        <nav class="absolute bottom-0 w-full glass pb-safe pt-2 z-30 border-t border-white/60 shadow-[0_-4px_20px_rgba(0,0,0,0.02)]">
            <div class="flex justify-between items-center px-2 nav-scroll hide-scrollbar min-w-full gap-2">
                <button id="nav-accounting" onclick="App.switchTab('accounting',this)" class="nav-item active flex flex-col items-center gap-1.5 p-2 min-w-[3.2rem] flex-shrink-0"><i class="fa-solid fa-house text-lg mb-0.5"></i> 記帳</button>
                <button onclick="App.switchTab('stock',this)" class="nav-item flex flex-col items-center gap-1.5 p-2 min-w-[3.2rem] flex-shrink-0"><i class="fa-solid fa-arrow-trend-up text-lg mb-0.5"></i> 股市</button>
                <button onclick="App.switchTab('investment',this)" class="nav-item flex flex-col items-center gap-1.5 p-2 min-w-[3.2rem] flex-shrink-0"><i class="fa-solid fa-piggy-bank text-lg mb-0.5"></i> 資產</button>
                
                <div class="relative -top-6 mx-1 flex-shrink-0">
                    <button onclick="App.handleFabClick()" class="fab-btn w-14 h-14 rounded-full text-white text-2xl flex items-center justify-center transition-transform hover:scale-105 active:scale-95 shadow-glow"><i class="fa-solid fa-plus"></i></button>
                </div>

                <button onclick="App.switchTab('debt',this)" class="nav-item flex flex-col items-center gap-1.5 p-2 min-w-[3.2rem] flex-shrink-0"><i class="fa-solid fa-file-invoice-dollar text-lg mb-0.5"></i> 負債</button>
                <button onclick="App.switchTab('events',this)" class="nav-item flex flex-col items-center gap-1.5 p-2 min-w-[3.2rem] flex-shrink-0"><i class="fa-solid fa-calendar-day text-lg mb-0.5"></i> 大事</button>
                <button onclick="App.switchTab('reports',this)" class="nav-item flex flex-col items-center gap-1.5 p-2 min-w-[3.2rem] flex-shrink-0"><i class="fa-solid fa-chart-pie text-lg mb-0.5"></i> 報表</button>
            </div>
        </nav>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="fixed inset-0 bg-slate-900/40 z-50 hidden flex items-end sm:items-center justify-center backdrop-blur-sm transition-opacity duration-300">
        <div id="modal-content" class="bg-white w-full max-w-[28rem] rounded-t-[2rem] sm:rounded-2xl p-6 shadow-2xl animate-slide-up sm:animate-fade-in max-h-[90vh] overflow-y-auto hide-scrollbar relative pb-10"><div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6 sm:hidden"></div></div>
    </div>
    <div id="sub-modal-overlay" class="fixed inset-0 bg-slate-900/30 z-[60] hidden flex items-end sm:items-center justify-center backdrop-blur-sm transition-all"><div id="sub-modal-content" class="bg-white w-full max-w-[28rem] rounded-t-[2rem] sm:rounded-2xl p-6 shadow-2xl animate-slide-up max-h-[70vh] overflow-y-auto hide-scrollbar"></div></div>

    <!-- TEMPLATES -->
    <template id="tpl-ledger-modal">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold text-slate-800">選擇帳本</h3>
            <button onclick="App.closeModal()" class="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 hover:bg-slate-200 transition"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="ledger-list" class="space-y-3 mb-6 max-h-[50vh] overflow-y-auto hide-scrollbar px-1">
            <!-- 帳本列表會在這裡生成 -->
        </div>
        <div class="border-t border-slate-100 pt-5">
            <h4 class="text-xs font-bold text-slate-400 mb-3 ml-1">建立全新帳務</h4>
            <form onsubmit="App.handleAddLedger(event)" class="flex gap-2">
                <input type="text" name="name" class="input-box flex-1 rounded-xl p-3 text-sm" placeholder="輸入新帳本名稱..." required>
                <button type="submit" class="bg-slate-800 text-white px-5 rounded-xl font-bold text-sm hover:bg-slate-900 transition active:scale-[0.98]">新增</button>
            </form>
        </div>
    </template>

    <template id="tpl-notifications"><div class="flex justify-between items-center mb-6"><h3 class="text-xl font-bold text-slate-800">提醒事項</h3><button onclick="App.closeModal()" class="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 hover:bg-slate-200"><i class="fa-solid fa-xmark"></i></button></div><div id="notification-list" class="space-y-3 pb-4"></div><div id="no-notification" class="hidden text-center py-10"><div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-3 text-slate-300"><i class="fa-regular fa-bell-slash text-xl"></i></div><p class="text-slate-400 text-xs">目前沒有待辦事項</p></div></template>

    <template id="tpl-accounting">
        <div class="gradient-card rounded-3xl p-5 shadow-soft relative overflow-hidden mb-4">
            <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full blur-2xl -mr-10 -mt-10"></div><div class="absolute bottom-0 left-0 w-24 h-24 bg-black/10 rounded-full blur-xl -ml-10 -mb-5"></div>
            <div id="acc-overdue-badge" class="absolute -top-1 -left-1 hidden z-20 animate-pulse-fast"><div class="bg-rose-500 text-white text-[10px] font-bold px-3 py-1 rounded-br-2xl rounded-tl-xl shadow-md border-b-2 border-r-2 border-rose-700/30">⚠️ 逾期未收 <span id="acc-overdue-val"></span></div></div>
            <div id="acc-pending-income-badge" class="absolute bottom-0 right-0 hidden z-20"><div class="bg-white/20 backdrop-blur-sm text-white text-[10px] font-bold px-3 py-1 rounded-tl-2xl shadow-sm border-t border-l border-white/20">📅 本月預期 <span id="acc-pending-income-val"></span></div></div>
            <div class="relative z-10">
                <div class="flex justify-between items-center mb-6 pl-2"><span class="text-indigo-100 text-xs font-medium bg-white/10 px-2 py-1 rounded-lg backdrop-blur-sm">本月概況</span><div class="relative"><input type="month" id="date-filter" class="bg-white/20 text-white border-none rounded-lg px-3 py-1 text-xs font-bold focus:ring-2 focus:ring-white/50 cursor-pointer pl-8 backdrop-blur-sm placeholder-white" onchange="App.renderTransactions(true)"><i class="fa-regular fa-calendar absolute left-2.5 top-1/2 -translate-y-1/2 text-xs text-indigo-100 pointer-events-none"></i></div></div>
                <div class="flex flex-col items-center mb-6"><span class="text-indigo-100 text-xs mb-1">本月結餘</span><span id="monthly-balance" class="text-4xl font-bold tracking-tight text-white drop-shadow-sm">0</span></div>
                <div class="grid grid-cols-2 gap-4"><div class="bg-white/10 backdrop-blur-sm rounded-xl p-3 border border-white/10"><p class="text-[10px] opacity-80 mb-1">總收入</p><p id="monthly-income" class="text-lg font-bold">0</p></div><div class="bg-white/10 backdrop-blur-sm rounded-xl p-3 border border-white/10"><p class="text-[10px] opacity-80 mb-1">總支出</p><p id="monthly-expense" class="text-lg font-bold">0</p></div></div>
            </div>
        </div>
        <div class="flex items-center justify-between px-2 pt-2 mb-2"><span class="text-xs font-bold text-slate-400">本日小計</span><div class="flex gap-3 text-xs font-medium"><span class="text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded">收 <span id="today-income">0</span></span><span class="text-rose-500 bg-rose-50 px-2 py-0.5 rounded">支 <span id="today-expense">0</span></span><span class="text-slate-500 bg-slate-100 px-2 py-0.5 rounded" id="today-balance-container">餘 <span id="today-balance">0</span></span></div></div>
        <ul id="tx-list" class="space-y-4 pb-6"></ul>
        <div class="mt-8 pb-4"><div class="flex justify-between items-center px-1 mb-3"><span class="text-xs font-bold text-slate-400 uppercase tracking-wider">預算 / 排程</span><button onclick="App.openBudgetModal('accounting')" class="text-primary text-[10px] font-bold bg-indigo-50 px-2 py-1 rounded-lg hover:bg-indigo-100"><i class="fa-solid fa-plus"></i> 新增</button></div><ul id="accounting-budget-list" class="space-y-2"></ul></div>
    </template>

    <template id="tpl-stock">
        <div class="bg-slate-800 text-white p-5 rounded-3xl shadow-soft mb-4 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-primary/20 rounded-full blur-2xl -mr-10 -mt-10"></div>
            <div class="relative z-10 flex justify-between items-start">
                <div>
                    <p class="text-slate-400 text-xs font-medium mb-1">股市總資產</p>
                    <h2 id="stock-total-assets" class="text-3xl font-bold tracking-tight mb-2">--</h2>
                    <div class="flex gap-4 border-t border-slate-700/50 pt-3">
                        <div><span class="text-slate-400 text-[10px] block mb-0.5">總損益</span><span id="stock-total-pl" class="font-bold text-sm">--</span></div>
                        <div><span class="text-slate-400 text-[10px] block mb-0.5">報酬率</span><span id="stock-roi" class="font-bold text-sm">--</span></div>
                    </div>
                </div>
                <div class="text-right">
                    <div class="bg-white/10 backdrop-blur-sm rounded-xl p-2 border border-white/10 text-center mb-2">
                        <p class="text-[10px] text-slate-300 mb-0.5">本月投入資金</p>
                        <p id="stock-monthly-invest" class="text-lg font-bold text-emerald-400">0</p>
                    </div>
                    <p class="text-[10px] text-slate-400">總成本: <span id="stock-total-cost">--</span></p>
                    <p class="text-[10px] text-slate-400 mt-1">已實現: <span id="stock-realized-pl">--</span></p>
                </div>
            </div>
        </div>
        
        <div class="flex justify-between items-center mb-3 px-1">
            <h3 class="font-bold text-slate-700 text-sm">持股明細</h3>
            <div class="flex gap-2">
                <button onclick="App.copyStockReport()" class="w-8 h-8 rounded-lg bg-indigo-50 text-primary hover:bg-indigo-100 flex items-center justify-center transition" title="複製紀錄"><i class="fa-solid fa-copy text-xs"></i></button>
                <button onclick="App.exportStockReport()" class="w-8 h-8 rounded-lg bg-indigo-50 text-primary hover:bg-indigo-100 flex items-center justify-center transition" title="匯出 CSV"><i class="fa-solid fa-file-export text-xs"></i></button>
                <button id="btn-update-all" onclick="App.updateAllStockPrices()" class="bg-indigo-50 text-primary text-[10px] font-bold px-3 py-1.5 rounded-lg hover:bg-indigo-100 transition flex items-center gap-1"><i class="fa-solid fa-rotate"></i> 更新股價</button>
            </div>
        </div>
        
        <div id="stock-list" class="space-y-3"></div>
        <div class="h-20"></div>
    </template>

    <template id="tpl-investment">
        <div class="sticky top-0 z-10 bg-[#f8fafc]/90 backdrop-blur-md pb-2 -mt-2 pt-2 flex justify-between items-center mb-2 px-1"><h3 class="text-lg font-bold text-slate-700">其他資產</h3><input type="month" id="inv-date-filter" class="bg-white border-none rounded-lg px-2 py-1.5 text-xs font-bold text-slate-600 shadow-sm" onchange="App.renderInvestments()"></div>
        <div class="bg-white p-5 rounded-3xl shadow-soft border border-slate-100 relative overflow-hidden mb-4">
            <div class="relative z-10"><p class="text-slate-400 text-xs font-medium mb-1">資產總淨值</p><h2 id="inv-total-val" class="text-3xl font-bold tracking-tight mb-2 text-slate-800">--</h2><div class="flex gap-4 border-t border-slate-100 pt-3"><div><span class="text-slate-400 text-[10px] block mb-0.5">累積損益</span><span id="inv-total-ret" class="font-bold text-sm text-slate-700">--</span></div><div><span class="text-slate-400 text-[10px] block mb-0.5">報酬率</span><span id="inv-roi" class="font-bold text-sm">--</span></div></div><div id="inv-penalty-summary" class="mt-3 pt-2 border-t border-slate-100 flex items-center justify-between text-rose-500 hidden"><span class="text-[10px] font-bold">⚠️ 待收罰金</span><span class="font-bold text-xs" id="inv-total-penalty">$0</span></div></div>
        </div>
        <div class="flex justify-between items-center mb-3"><div class="bg-white p-1 rounded-xl shadow-sm inline-flex"><button class="tab-pill px-4 py-1.5 rounded-lg text-xs font-bold text-slate-500 transition-all active bg-indigo-50 text-primary" onclick="App.switchInvTab('active',this)">進行中</button><button class="tab-pill px-4 py-1.5 rounded-lg text-xs font-bold text-slate-500 transition-all hover:text-slate-700" onclick="App.switchInvTab('archived',this)">已結案</button></div><button onclick="App.openModal('investment-modal')" class="text-primary text-xs font-bold bg-indigo-50 px-3 py-2 rounded-xl hover:bg-indigo-100 flex items-center gap-1"><i class="fa-solid fa-plus"></i> 新增帳戶</button></div>
        <span id="inv-monthly-summary" class="block text-center text-xs text-slate-400 mb-3 bg-white/50 py-1 rounded-lg">本月收益: $0</span>
        <div id="inv-list" class="grid gap-3"></div>
        <div class="mt-6"><div class="flex justify-between items-center px-1 mb-3"><span class="text-xs font-bold text-slate-400 uppercase tracking-wider">定期定額 / 預期收入</span><div class="flex gap-2"><select id="inv-budget-filter-select" class="bg-slate-100 border-none rounded-lg px-2 py-1 text-[10px] font-bold text-slate-500 outline-none" onchange="App.renderInvestments()"><option value="all">全部</option></select><button onclick="App.openBudgetModal('investment')" class="text-secondary text-[10px] font-bold bg-emerald-50 px-2 py-1 rounded-lg hover:bg-emerald-100"><i class="fa-solid fa-plus"></i> 新增</button></div></div><ul id="inv-budget-list" class="space-y-2"></ul></div>
    </template>

    <template id="tpl-debt">
         <div class="sticky top-0 z-10 bg-[#f8fafc]/90 backdrop-blur-md pb-2 -mt-2 pt-2 flex justify-between items-center mb-2 px-1"><h3 class="text-lg font-bold text-slate-700">負債管理</h3><input type="month" id="debt-date-filter" class="bg-white border-none rounded-lg px-2 py-1.5 text-xs font-bold text-slate-600 shadow-sm" onchange="App.renderDebts()"></div>
        <div class="bg-white p-5 rounded-3xl shadow-soft border-l-4 border-warning mb-4 relative overflow-hidden">
             <div class="flex justify-between items-end mb-4 relative z-10"><div><p class="text-xs text-slate-400 font-medium mb-1">剩餘總負債</p><p id="debt-total-remaining" class="text-3xl font-bold text-slate-800 tracking-tight">--</p></div><div class="text-right"><p class="text-[10px] text-slate-400 mb-1">整體還款進度</p><p id="debt-progress-text" class="text-xl font-bold text-warning">0%</p></div></div>
            <div class="w-full bg-slate-100 rounded-full h-3 overflow-hidden relative z-10"><div id="debt-progress-bar" class="bg-warning h-full rounded-full transition-all duration-1000 ease-out relative" style="width:0%"><div class="absolute inset-0 bg-white/30 w-full h-full animate-[pulse_2s_infinite]"></div></div></div><div class="absolute right-0 bottom-0 w-32 h-32 bg-warning/5 rounded-full blur-2xl -mr-10 -mb-10"></div>
        </div>
        <div class="flex justify-between items-center px-1 mb-3"><span id="debt-monthly-summary" class="text-xs text-danger font-bold bg-rose-50 px-2 py-1 rounded-lg">本月還款: $0</span><button onclick="App.openModal('debt-modal')" class="text-primary text-xs font-bold bg-indigo-50 px-3 py-2 rounded-xl hover:bg-indigo-100 flex items-center gap-1"><i class="fa-solid fa-plus"></i> 新增項目</button></div>
        <div id="debt-list" class="space-y-3"></div>

    <template id="tpl-details-modal"><div class="sticky top-0 bg-white z-10 pb-4 border-b border-slate-50 mb-4 flex justify-between items-center gap-2"><h3 class="text-lg font-bold text-slate-800 details-title truncate flex-1 pr-1"></h3><div class="flex items-center gap-1" id="details-header-actions"></div><button type="button" onclick="App.closeModal()" class="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 hover:bg-slate-100 flex-shrink-0 ml-1"><i class="fa-solid fa-xmark"></i></button></div><div class="max-h-[60vh] overflow-y-auto hide-scrollbar"><div class="details-budget-section mb-6 hidden"><h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">預算計畫</h4><ul class="details-budget-list space-y-2"></ul></div><div><h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">歷史紀錄</h4><ul class="details-list space-y-3"><li class="text-center text-slate-300 py-6 text-xs">載入中...</li></ul></div></div><div class="details-actions mt-4 pt-4 border-t border-slate-100 flex flex-col gap-2 sticky bottom-0 bg-white pb-2"></div></template>

    <script type="module">
        import {initializeApp} from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import {getAuth,signInAnonymously,onAuthStateChanged,GoogleAuthProvider,signInWithPopup,signOut} from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import {getFirestore,collection,addDoc,query,onSnapshot,doc,deleteDoc,updateDoc,increment,Timestamp,writeBatch,getDocs,getDoc,setDoc} from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        const FIREBASE_API_KEY = "AIzaSyAqFHm6Bn35m8xauc50ZvNNy_rxIZzCMTE";
        const GEMINI_API_KEY = "AIzaSyAze_WqtUmWv7i2xwQHosePZtUI9NZvr0w";
        
        // Define Global App Object Immediately (and locally for module scope access)
        const App = window.App = {};
        
        try {
            const app=initializeApp({apiKey:FIREBASE_API_KEY,authDomain:"moneyw-f8105.firebaseapp.com",projectId:"moneyw-f8105",storageBucket:"moneyw-f8105.appspot.com",messagingSenderId:"155586195799",appId:"1:155586195799:web:302184fbf613f032a88e12"});
            const auth=getAuth(app);
            const db=getFirestore(app);

            const State={user:null,ledgers:[],currentLedger:'default',data:{transactions:[],debts:[],investments:[],stocks:[],stockTxs:[],events:[],investmentBudgets:[],debtBudgets:[],accountingBudgets:[],legacyTxs:{}},listeners:[],chart:null,categories:{expense:['飲食','交通','居住','娛樂','購物','醫療','教育','投資','其他'],income:['薪資','獎金','投資','兼職','其他']},view:{invTab:'active',currentTab:'accounting', txPage: 1, txPageSize: 7},reminders:[]};
            const $=i=>document.getElementById(i);
            const Q=s=>document.querySelector(s);
            const getTxDate=t=>{if(!t)return new Date();try{if(t.timestamp?.toDate)return t.timestamp.toDate();if(t.date){if(t.date.toDate)return t.date.toDate();const d=new Date(t.date);if(!isNaN(d))return d}if(t.timestamp?.seconds)return new Date(t.timestamp.seconds*1000)}catch(e){}return new Date()};
            const toDateStr=d=>{const dt=(d instanceof Date)?d:getTxDate({timestamp:d});return dt.toISOString().split('T')[0]};
            
            // Helper for Ledger Path dynamically isolation
            App.path = (c) => State.currentLedger === 'default' ? `users/${State.user.uid}/${c}` : `users/${State.user.uid}/ledgers/${State.currentLedger}/${c}`;

            const STOCK_MAP = {
                '0050':'元大台灣50','0056':'元大高股息','00878':'國泰永續高股息','00929':'復華台灣科技優息','00919':'群益台灣精選高息','00940':'元大台灣價值高息','006208':'富邦台50','2330':'台積電','2317':'鴻海','2337':'旺宏','2454':'聯發科','2308':'台達電','2382':'廣達','2881':'富邦金','2882':'國泰金','2412':'中華電','1301':'台塑','1303':'南亞','2002':'中鋼','2303':'聯電','2891':'中信金','2886':'兆豐金','2884':'玉山金','2892':'第一金','5880':'合庫金','2885':'元大金','2880':'華南金','2883':'開發金','2887':'台新金','2890':'永豐金','1216':'統一','2912':'統一超','3008':'大立光','1101':'台泥','1102':'亞泥','2327':'國巨','2357':'華碩','2395':'研華','3045':'台灣大','4904':'遠傳','2603':'長榮','2609':'陽明','2615':'萬海','9910':'豐泰','9904':'寶成','1402':'遠東新','6505':'台塑化','2408':'南亞科','2344':'華邦電','2409':'友達','3481':'群創','2353':'宏碁','2324':'仁寶','3231':'緯創','3711':'日月光投控','5871':'中租-KY','1605':'華新','2379':'瑞昱','3034':'聯詠','2345':'智邦','2377':'微星','2301':'光寶科','4938':'和碩','3037':'欣興','2474':'可成','4958':'臻鼎-KY','6415':'矽力-KY','2492':'華新科'
            };

            // --- App Implementation ---
            App.init = () => onAuthStateChanged(auth, async u => {
                State.user = u;
                $('login-view').classList.toggle('hidden', !!u);
                $('app-container').classList.toggle('hidden', !u);
                if (u) {
                    try {
                        const profileRef = doc(db, `users/${u.uid}/settings/profile`);
                        const profileSnap = await getDoc(profileRef);
                        if (profileSnap.exists() && profileSnap.data().ledgers) {
                            const p = profileSnap.data();
                            State.ledgers = p.ledgers;
                            State.currentLedger = p.currentLedger || 'default';
                        } else {
                            State.ledgers = [{id: 'default', name: '預設帳本'}];
                            State.currentLedger = 'default';
                            setDoc(profileRef, { ledgers: State.ledgers, currentLedger: State.currentLedger }).catch(e => console.warn(e));
                        }
                    } catch(e) {
                        console.error("Profile load err", e);
                        State.ledgers = [{id: 'default', name: '預設帳本'}];
                        State.currentLedger = 'default';
                    }
                    
                    const curL = State.ledgers.find(l => l.id === State.currentLedger) || State.ledgers[0];
                    if ($('current-ledger-name')) $('current-ledger-name').innerText = curL.name;

                    App.switchTab('accounting', Q('#nav-accounting'));
                    setTimeout(() => App.startListeners(u.uid), 100);
                } else {
                    App.stopListeners();
                }
            });

            // Ledger Management Methods
            App.openLedgerModal = () => {
                const c = $('modal-content'); 
                c.innerHTML = $('tpl-ledger-modal').innerHTML;
                App.renderLedgerList();
                $('modal-overlay').classList.remove('hidden'); 
                $('modal-overlay').classList.add('flex');
            };

            App.renderLedgerList = () => {
                const list = $('ledger-list');
                if(!list) return;
                list.innerHTML = State.ledgers.map(l => `
                    <div class="flex justify-between items-center p-3 rounded-xl border ${l.id === State.currentLedger ? 'border-primary bg-indigo-50/50' : 'border-slate-100 bg-white'} cursor-pointer hover:border-primary transition" onclick="App.switchLedger('${l.id}')">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full ${l.id === State.currentLedger ? 'bg-primary text-white' : 'bg-slate-100 text-slate-400'} flex items-center justify-center font-bold">
                                <i class="fa-solid fa-book"></i>
                            </div>
                            <span class="font-bold ${l.id === State.currentLedger ? 'text-primary' : 'text-slate-700'}">${l.name}</span>
                        </div>
                        ${l.id !== 'default' ? `<button type="button" onclick="event.stopPropagation(); App.deleteLedger('${l.id}')" class="w-8 h-8 flex items-center justify-center text-slate-300 hover:text-rose-500 transition"><i class="fa-solid fa-trash text-xs"></i></button>` : ''}
                    </div>
                `).join('');
            };

            App.switchLedger = (id) => {
                if(State.currentLedger === id) return App.closeModal();
                State.currentLedger = id;
                $('current-ledger-name').innerText = State.ledgers.find(l => l.id === id)?.name || '未知帳本';
                
                updateDoc(doc(db, `users/${State.user.uid}/settings/profile`), { currentLedger: id });
                App.closeModal();
                
                App.stopListeners();
                State.data = {transactions:[],debts:[],investments:[],stocks:[],stockTxs:[],events:[],investmentBudgets:[],debtBudgets:[],accountingBudgets:[],legacyTxs:{}};
                App.startListeners(State.user.uid);
            };

            App.handleAddLedger = (e) => {
                e.preventDefault();
                const name = e.target.name.value;
                const newId = 'l_' + Date.now().toString(36);
                State.ledgers.push({ id: newId, name });
                
                updateDoc(doc(db, `users/${State.user.uid}/settings/profile`), { ledgers: State.ledgers });
                
                e.target.reset();
                App.renderLedgerList();
            };

            App.deleteLedger = (id) => {
                if(!confirm('確定要刪除此帳本嗎？此帳本相關的所有資料將會無法存取！')) return;
                State.ledgers = State.ledgers.filter(l => l.id !== id);
                if (State.currentLedger === id) {
                    State.currentLedger = 'default';
                    $('current-ledger-name').innerText = State.ledgers.find(l => l.id === 'default')?.name;
                    updateDoc(doc(db, `users/${State.user.uid}/settings/profile`), { currentLedger: 'default', ledgers: State.ledgers });
                    App.stopListeners();
                    State.data = {transactions:[],debts:[],investments:[],stocks:[],stockTxs:[],events:[],investmentBudgets:[],debtBudgets:[],accountingBudgets:[],legacyTxs:{}};
                    App.startListeners(State.user.uid);
                } else {
                    updateDoc(doc(db, `users/${State.user.uid}/settings/profile`), { ledgers: State.ledgers });
                }
                App.renderLedgerList();
            };

            App.startListeners = uid => {
                const l = (c, k) => State.listeners.push(onSnapshot(query(collection(db, App.path(c))), s => {
                    State.data[k] = s.docs.map(d => ({ id: d.id, ...d.data() }));
                    App.calculateReminders();
                    App.refreshCurrentView();
                    if (k === 'debts') App.processAutoInterest(State.data.debts, 'debt');
                }));
                ['transactions', 'debts', 'events', 'debtBudgets', 'accountingBudgets', 'stocks', 'stockTransactions'].forEach(k => l(k, k === 'stockTransactions' ? 'stockTxs' : k));
                
                State.listeners.push(onSnapshot(query(collection(db, App.path('debtBudgets'))), s => {
                    const list = s.docs.map(d => ({ id: d.id, ...d.data() }));
                    State.data.debtBudgets = list;
                    App.checkAutoBudgetItems(list, 'debt');
                    App.calculateReminders();
                    App.refreshCurrentView();
                }));

                State.listeners.push(onSnapshot(query(collection(db, App.path('investmentBudgets'))), s => {
                    const list = s.docs.map(d => ({ id: d.id, ...d.data() }));
                    State.data.investmentBudgets = list;
                    App.checkAutoBudgetItems(list, 'investment');
                    App.calculateReminders();
                    App.refreshCurrentView();
                }));
                
                State.listeners.push(onSnapshot(query(collection(db, App.path('investments'))), async s => {
                    State.data.investments = s.docs.map(d => ({ id: d.id, ...d.data() }));
                    App.processAutoInterest(State.data.investments, 'investment');
                    for (let i of State.data.investments) {
                        if (!State.data.legacyTxs[i.id]) try {
                            const sub = await getDocs(collection(db, `${App.path('investments')}/${i.id}/transactions`));
                            State.data.legacyTxs[i.id] = sub.docs.map(d => {
                                const v = d.data();
                                return { id: d.id, ...v, timestamp: v.timestamp || v.date || Timestamp.now(), isLegacy: true, legacyInvId: i.id };
                            });
                        } catch (e) { State.data.legacyTxs[i.id] = []; }
                    }
                    App.refreshCurrentView();
                }));
            };

            App.calculateReminders = () => {
                const t = new Date(); t.setHours(0, 0, 0, 0); const l = new Date(t); l.setDate(t.getDate() + 3);
                const all = [...State.data.accountingBudgets.map(b => ({ ...b, s: 'accounting', l: '記帳' })), ...State.data.investmentBudgets.map(b => ({ ...b, s: 'investment', l: '投資' })), ...State.data.debtBudgets.map(b => ({ ...b, s: 'debt', l: '負債' }))];
                State.reminders = all.filter(b => !b.isRealized && getTxDate({ timestamp: b.expectedDate }) <= l).sort((a, b) => getTxDate({ timestamp: a.expectedDate }) - getTxDate({ timestamp: b.expectedDate }));
                const bg = $('notification-badge'); State.reminders.length ? bg.classList.remove('hidden') : bg.classList.add('hidden');
            };

            App.openNotificationModal = () => {
                const c = $('modal-content'); c.innerHTML = $('tpl-notifications').innerHTML;
                const l = c.querySelector('#notification-list');
                if (!State.reminders.length) {
                    l.classList.add('hidden'); c.querySelector('#no-notification').classList.remove('hidden');
                } else {
                    const t = new Date(); t.setHours(0, 0, 0, 0);
                    l.innerHTML = State.reminders.map(r => {
                        const d = getTxDate({ timestamp: r.expectedDate }); d.setHours(0, 0, 0, 0);
                        let s = '即將到期', sc = 'text-slate-500 bg-slate-50 border-slate-100', ic = 'fa-calendar-day';
                        if (d < t) { s = '已逾期'; sc = 'text-rose-500 bg-rose-50 border-rose-100'; ic = 'fa-circle-exclamation'; }
                        else if (d.getTime() === t.getTime()) { s = '今天到期'; sc = 'text-amber-500 bg-amber-50 border-amber-100'; ic = 'fa-clock'; }
                        let n = r.targetId; if (r.s === 'investment') n = State.data.investments.find(i => i.id === r.targetId)?.name || '未知'; if (r.s === 'debt') n = State.data.debts.find(d => d.id === r.targetId)?.name || '未知';
                        return `<div class="flex items-center gap-3 p-3 rounded-xl border ${sc} cursor-pointer" onclick="App.openBudgetModal('${r.s}','${r.id}');App.closeModal()"><div class="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-sm shrink-0"><i class="fa-solid ${ic} text-lg ${sc.split(' ')[0]}"></i></div><div class="flex-1 min-w-0"><div class="flex justify-between items-center mb-0.5"><span class="text-[10px] font-bold px-2 py-0.5 rounded-full bg-white/60 ${sc.split(' ')[0]}">${s}</span><span class="text-xs text-slate-400 font-mono">${toDateStr(d)}</span></div><div class="flex justify-between items-center"><h4 class="font-bold text-slate-700 text-sm truncate pr-2">${r.description || n}</h4><span class="font-bold text-slate-800 text-sm whitespace-nowrap">$${parseFloat(r.amount).toLocaleString()}</span></div><p class="text-[10px] text-slate-400 mt-0.5">分類: ${r.l}</p></div></div>`;
                    }).join('');
                }
                $('modal-overlay').classList.remove('hidden'); $('modal-overlay').classList.add('flex');
            };

            // Enhanced Auto Logic
            App.checkAutoBudgetItems = async (list, type) => {
                const b = writeBatch(db), t = new Date(); t.setHours(0, 0, 0, 0); let has = false;
                const ex = list.filter(x => x.isPenalty || x.isRecurringItem);
                const colName = type === 'investment' ? 'investmentBudgets' : 'debtBudgets';
                
                for (const i of list) {
                    // Penalty Logic
                    if (!i.isPenalty && !i.isRealized && i.enablePenalty && i.dailyPenalty > 0) {
                        const e = getTxDate({ timestamp: i.expectedDate }); e.setHours(0, 0, 0, 0);
                        if (t > e) {
                            let c = new Date(e); c.setDate(c.getDate() + 1);
                            while (c <= t) {
                                // Check if penalty for this specific date exists
                                if (!ex.some(p => p.isPenalty && p.parentBudgetId === i.id && getTxDate({ timestamp: p.expectedDate }).getTime() === c.getTime())) {
                                    b.set(doc(collection(db, App.path(colName))), { 
                                        targetId: i.targetId, 
                                        parentBudgetId: i.id, 
                                        amount: parseFloat(i.dailyPenalty), 
                                        expectedDate: Timestamp.fromDate(new Date(c)), 
                                        description: `[罰金] ${i.description} (${c.getMonth() + 1}/${c.getDate()})`, 
                                        type: type === 'investment' ? 'income' : 'expense', // Penalty on debt is expense, on investment (receivable) is income
                                        isRealized: false, 
                                        isPenalty: true, 
                                        createdAt: Timestamp.now() 
                                    }); 
                                    has = true;
                                }
                                c.setDate(c.getDate() + 1);
                            }
                        }
                    }
                    // Recurring Logic
                    if (i.enableRecurring && i.recurringDays > 0 && !i.isRecurringItem) {
                        let ld = i.lastRecurringDate ? getTxDate({ timestamp: i.lastRecurringDate }) : getTxDate({ timestamp: i.expectedDate }); ld.setHours(0, 0, 0, 0);
                        let nd = new Date(ld); nd.setDate(nd.getDate() + parseInt(i.recurringDays));
                        while (nd <= t) {
                            if (!ex.some(x => x.isRecurringItem && x.parentBudgetId === i.id && getTxDate({ timestamp: x.expectedDate }).getTime() === nd.getTime())) {
                                b.set(doc(collection(db, App.path(colName))), { 
                                    targetId: i.targetId, 
                                    parentBudgetId: i.id, 
                                    amount: parseFloat(i.amount), 
                                    expectedDate: Timestamp.fromDate(new Date(nd)), 
                                    description: `[自動] ${i.description} (${nd.getMonth() + 1}/${nd.getDate()})`, 
                                    type: i.type || (type === 'investment' ? 'income' : 'expense'), 
                                    isRealized: false, 
                                    isRecurringItem: true, 
                                    createdAt: Timestamp.now() 
                                });
                                b.update(doc(db, App.path(colName), i.id), { lastRecurringDate: Timestamp.fromDate(new Date(nd)) }); 
                                has = true;
                            }
                            nd.setDate(nd.getDate() + parseInt(i.recurringDays));
                        }
                    }
                }
                if (has) await b.commit();
            };

            App.processAutoInterest = async (items, type) => {
                const now = new Date();
                const currentMonthKey = `${now.getFullYear()}-${now.getMonth() + 1}`;
                const b = writeBatch(db);
                let has = false;
                const colName = type === 'investment' ? 'investmentBudgets' : 'debtBudgets';
                const budgetList = State.data[colName] || [];

                for (const item of items) {
                    if (item.annualRate && parseFloat(item.annualRate) > 0) {
                        // Check if interest budget already exists for this month
                        const alreadyExists = budgetList.some(budget => 
                            budget.targetId === item.id && 
                            budget.isAutoInterest && 
                            budget.forMonth === currentMonthKey
                        );

                        if (!alreadyExists) {
                            // Logic: Interest generated on the 1st of month or today if not generated
                            // Amount = Principal * (Rate/100) / 12
                            const principal = type === 'investment' ? (parseFloat(item.marketValue) || parseFloat(item.initialValue)) : parseFloat(item.remainingAmount);
                            const monthlyRate = parseFloat(item.annualRate) / 100 / 12;
                            const interestAmount = Math.round(principal * monthlyRate);

                            if (interestAmount > 0) {
                                b.set(doc(collection(db, App.path(colName))), {
                                    targetId: item.id,
                                    amount: interestAmount,
                                    expectedDate: Timestamp.now(),
                                    description: `[自動利息] ${currentMonthKey} (${item.annualRate}%)`,
                                    type: type === 'investment' ? 'income' : 'expense',
                                    isRealized: false,
                                    isAutoInterest: true,
                                    forMonth: currentMonthKey,
                                    createdAt: Timestamp.now()
                                });
                                has = true;
                            }
                        }
                    }
                }
                if (has) await b.commit();
            };

                    if (!holdings[t.symbol]) holdings[t.symbol] = { s: t.symbol, n: t.name, q: 0, cost: 0, realized: 0 };
                    const h = holdings[t.symbol];
                    if (t.type === 'buy') { 
                        h.q += t.quantity; 
                        h.cost += t.total; 
                        h.n = t.name || h.n; 
                    } else if (t.type === 'sell') { 
                        const avgCost = h.q > 0 ? h.cost / h.q : 0; 
                        const costSold = avgCost * t.quantity;
                        h.realized += (t.total - costSold);
                        h.q -= t.quantity; 
                        h.cost -= costSold; 
                        if (h.q < 0.0001) { h.q = 0; h.cost = 0; }
                    } else if (t.type === 'dividend') {
                        h.realized += t.total;
                    }
                });
                let totalMkt = 0, totalCost = 0, totalRealized = 0;
                
                // Calculate Monthly Investment
                const now = new Date();
                const currentMonthStart = new Date(now.getFullYear(), now.getMonth(), 1);
                const currentMonthEnd = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59);
                
                const monthlyInvest = (State.data.stockTxs || []).filter(t => {
                    const d = getTxDate(t);
                    return t.type === 'buy' && d >= currentMonthStart && d <= currentMonthEnd;
                }).reduce((sum, t) => sum + t.total, 0);

                const listHtml = Object.values(holdings).filter(h => h.q > 0 || h.realized !== 0).map(h => {

                    const mkt = Math.round(curr * h.q); 
                    const avg = h.q > 0 ? h.cost / h.q : 0; 
                    const pl = mkt - h.cost;
                    
                    totalMkt += mkt; 
                    totalCost += h.cost;
                    totalRealized += h.realized;
                    
                    const isCleared = h.q === 0;
                    
                    return `<div class="bg-white p-4 rounded-2xl shadow-soft border border-slate-50 mb-2 ${isCleared ? 'opacity-70 grayscale' : ''}" onclick="App.showStockDetails('${h.s}')">

                                </h4>
                                <p class="text-[10px] text-slate-400 mt-0.5">持股: ${h.q} 股 • 均價: ${avg.toFixed(1)}</p>

                                ${!isCleared ? `<button onclick="event.stopPropagation();App.updateStockPrice('${h.s}','${curr}')" class="bg-slate-50 px-2 py-1 rounded-lg text-xs font-bold text-slate-800 hover:bg-slate-100 transition mb-1">現價 $${curr}</button>` : ''}
                                <p class="text-[10px] font-bold ${h.realized >= 0 ? 'text-emerald-500' : 'text-rose-500'}">已實現: ${h.realized >= 0 ? '+' : ''}${Math.round(h.realized).toLocaleString()}</p>

                            <span class="text-slate-400">市值 $${mkt.toLocaleString()}</span>

                        </div>
